<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Digital Gemini</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
        }

        h1 { margin-bottom: 20px; }

        .piano-container {
            display: flex;
            position: relative;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .key {
            cursor: pointer;
            user-select: none;
        }

        .white {
            width: 60px;
            height: 200px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            color: #333;
            font-weight: bold;
            z-index: 1;
        }

        .white:active, .white.active {
            background: #e0e0e0;
            height: 195px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .black {
            width: 40px;
            height: 120px;
            background: #333;
            border-radius: 0 0 3px 3px;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            color: white;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            font-size: 12px;
        }

        .black:active, .black.active {
            background: #555;
            height: 118px;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>Piano Simple Gemini</h1>
    
    <div class="piano-container">
        <div class="key white" data-note="261.63" data-key="a">C (A)</div>
        <div class="key black" data-note="277.18" data-key="w">C# (W)</div>
        <div class="key white" data-note="293.66" data-key="s">D (S)</div>
        <div class="key black" data-note="311.13" data-key="e">D# (E)</div>
        <div class="key white" data-note="329.63" data-key="d">E (D)</div>
        <div class="key white" data-note="349.23" data-key="f">F (F)</div>
        <div class="key black" data-note="369.99" data-key="t">F# (T)</div>
        <div class="key white" data-note="392.00" data-key="g">G (G)</div>
        <div class="key black" data-note="415.30" data-key="y">G# (Y)</div>
        <div class="key white" data-note="440.00" data-key="h">A (H)</div>
        <div class="key black" data-note="466.16" data-key="u">A# (U)</div>
        <div class="key white" data-note="493.88" data-key="j">B (J)</div>
        <div class="key white" data-note="523.25" data-key="k">C2 (K)</div>
    </div>

    <div class="controls">
        <p>Klik tuts atau gunakan keyboard laptop Anda:</p>
        <strong>A - S - D - F - G - H - J - K</strong> (Tuts Putih)<br>
        <strong>W - E - T - Y - U</strong> (Tuts Hitam)
    </div>

    <script>
        // Inisialisasi Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playNote(frequency) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'triangle'; // Suara lembut mirip piano
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        // Event Listener untuk Klik Mouse
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('mousedown', () => {
                playNote(parseFloat(key.dataset.note));
            });
        });

        // Event Listener untuk Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const element = document.querySelector(`.key[data-key="${key}"]`);
            if (element) {
                element.classList.add('active');
                playNote(parseFloat(element.dataset.note));
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            const element = document.querySelector(`.key[data-key="${key}"]`);
            if (element) {
                element.classList.remove('active');
            }
        });
    </script>
</body>
</html>
